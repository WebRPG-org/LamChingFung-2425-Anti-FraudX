# docker-compose.local.yml
# Local dev: uses host Ollama OR Gemini API, no GPU needed
#
# Ollama on host:  docker compose -f docker-compose.local.yml up
# Gemini mode:     GEMINI_ENABLED=true GEMINI_API_KEY=xxx docker compose -f docker-compose.local.yml up

services:
  frontend:
    image: node:20-alpine
    container_name: ai-antiscam-frontend-local
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./rpg-platform-v2:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - antiscam-local

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-antiscam-backend-local
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - GEMINI_ENABLED=${GEMINI_ENABLED:-false}
      # GEMINI_API_KEY is loaded from env_file (backend/.env) — do not override here
      - GEMINI_MODEL_SCAMMER=${GEMINI_MODEL_SCAMMER:-gemini-2.5-flash}
      - GEMINI_MODEL_EXPERT=${GEMINI_MODEL_EXPERT:-gemini-2.5-flash}
      - GEMINI_MODEL_VICTIM=${GEMINI_MODEL_VICTIM:-gemini-2.5-flash}
      - GEMINI_MODEL_RECORDER=${GEMINI_MODEL_RECORDER:-gemini-2.5-flash}
      - GEMINI_MAX_OUTPUT_TOKENS=800
      - GEMINI_TIMEOUT=45.0
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_BASE_URL_SCAMMER=${OLLAMA_BASE_URL_SCAMMER:-http://host.docker.internal:11434}
      - OLLAMA_BASE_URL_VICTIM=${OLLAMA_BASE_URL_VICTIM:-http://host.docker.internal:11434}
      - OLLAMA_BASE_URL_EXPERT=${OLLAMA_BASE_URL_EXPERT:-http://host.docker.internal:11434}
      - OLLAMA_BASE_URL_RECORDER=${OLLAMA_BASE_URL_RECORDER:-http://host.docker.internal:11434}
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=400
      - OLLAMA_NUM_PREDICT_RECORDER=1200
      - OLLAMA_TEMPERATURE=0.7
      - AGENT_MODEL=${AGENT_MODEL:-gemma3:4b}
      - AGENT_MODEL_SCAMMER=${AGENT_MODEL_SCAMMER:-gemma3:4b}
      - AGENT_MODEL_EXPERT=${AGENT_MODEL_EXPERT:-gemma3:4b}
      - APP_ENV=development
      - LOG_LEVEL=info
      - FORCE_GPU=0
      - PORT=8000
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend:ro
      - training_data_local:/app/backend/training_data
      - db_data_local:/app/backend/db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - antiscam-local

networks:
  antiscam-local:
    driver: bridge

volumes:
  training_data_local:
    name: ai-antiscam-training-data-local
  db_data_local:
    name: ai-antiscam-db-local
