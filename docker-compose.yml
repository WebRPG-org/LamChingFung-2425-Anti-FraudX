services:
  ollama:
    build: ./docker/ollama
    container_name: ollama
    gpus: all
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_LLM_LIBRARY=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib:${LD_LIBRARY_PATH}
    volumes:
      - ollama_data:/root/.ollama
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
    devices:
      - "/dev/dxg:/dev/dxg"
    restart: unless-stopped

  ai-anti-scam:
    build: .
    container_name: ai-anti-scam-platform
    # depends_on:
    #   - ollama
    gpus: all
    ports:
      - "8000:8000"
    # Development period: Mount the code to hot reload, avoid each build
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./backend/training_data:/app/backend/training_data
      - ./backend/models:/app/backend/models
      - ./backend/db:/app/backend/db
    environment:
      - PYTHONPATH=/app/backend
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - AGENT_MODEL=gemma3:4b
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ollama_data:
    driver: local
