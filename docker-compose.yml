version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-backend
    ports:
      - "8080:8080"
    environment:
      - AGENT_MODEL=gemma3:4b
      - APP_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ai-agent-network

  # 可選：Firestore模擬器（用於本地開發）
  firestore-emulator:
    image: google/cloud-sdk:emulators
    container_name: firestore-emulator
    ports:
      - "8081:8081"
    environment:
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8081
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8081
    networks:
      - ai-agent-network
    profiles:
      - dev

networks:
  ai-agent-network:
    driver: bridge
