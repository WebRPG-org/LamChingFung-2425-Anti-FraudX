services:
  backend:
    image: ai-agents-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000


  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
