version: '3.8'

services:
  # Ollama LLM服务
  ollama:
    build: 
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: ai-antiscam-ollama
    restart: unless-stopped
    runtime: nvidia  # 使用NVIDIA runtime
    
    # GPU配置 (NVIDIA) - 两种方式都保留以确保兼容性
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # 端口映射
    ports:
      - "11434:11434"
    
    # 环境变量
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_LLM_LIBRARY=cuda  # 强制使用CUDA (GPU)
      - OLLAMA_COMPUTE_UNIT=gpu  # 明确指定使用GPU
      - NVIDIA_VISIBLE_DEVICES=all  # 所有GPU可见
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility  # GPU能力
      - CUDA_VISIBLE_DEVICES=all  # CUDA设备可见性
    
    # 数据持久化
    volumes:
      - ollama_models:/root/.ollama
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    # 网络
    networks:
      - ai-antiscam-network

  # AI反诈骗平台
  ai-antiscam-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.10
    container_name: ai-antiscam-backend
    restart: unless-stopped
    
    # 依赖Ollama服务
    depends_on:
      ollama:
        condition: service_healthy
    
    # 端口映射
    ports:
      - "8000:8000"
    
    # 环境变量
    environment:
      # Python配置
      - PYTHONPATH=/app/backend
      - PYTHONUNBUFFERED=1
      
      # Ollama配置
      - OLLAMA_BASE_URL=http://ollama:11434
      - AGENT_MODEL=${AGENT_MODEL:-gemma3:4b}
      - AGENT_MODEL_SCAMMER=${AGENT_MODEL_SCAMMER:-gemma3:4b}
      - AGENT_MODEL_VICTIM=${AGENT_MODEL_VICTIM:-gemma3:4b}
      - AGENT_MODEL_EXPERT=${AGENT_MODEL_EXPERT:-gemma3:4b}
      - AGENT_MODEL_RECORDER=${AGENT_MODEL_RECORDER:-gemma3:4b}
      
      # GPU配置
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=all
      - FORCE_GPU=${FORCE_GPU:-1}  # 1=强制使用GPU, 0=允许CPU
      
      # 应用配置
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}  # 必须小写: info, debug, warning, error
    
    # 数据持久化和代码挂载
    volumes:
      # 代码挂载(开发模式，生产环境应注释掉)
      - ./backend:/app/backend  # 移除:ro以允许写日志
      - ./frontend:/app/frontend:ro
      
      # 数据持久化
      - training_data:/app/backend/training_data
      - models_data:/app/backend/models
      - db_data:/app/backend/db
      - arms_race_data:/app/backend/arms_race_data
      - agent_versions:/app/backend/agent_versions
      - ab_test_results:/app/backend/ab_test_results
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 网络
    networks:
      - ai-antiscam-network
    
    # 资源限制(可选)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
    #     reservations:
    #       cpus: '2'
    #       memory: 4G

# 网络配置
networks:
  ai-antiscam-network:
    driver: bridge
    name: ai-antiscam-network

# 数据卷
volumes:
  ollama_models:
    driver: local
    name: ai-antiscam-ollama-models
  
  training_data:
    driver: local
    name: ai-antiscam-training-data
  
  models_data:
    driver: local
    name: ai-antiscam-models
  
  db_data:
    driver: local
    name: ai-antiscam-db
  
  arms_race_data:
    driver: local
    name: ai-antiscam-arms-race
  
  agent_versions:
    driver: local
    name: ai-antiscam-versions
  
  ab_test_results:
    driver: local
    name: ai-antiscam-ab-tests
