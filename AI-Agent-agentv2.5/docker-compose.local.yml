# Docker Compose配置 - 使用本地Ollama
version: '3.8'

services:
  # AI反诈骗平台 Backend（使用主机上的Ollama）
  ai-antiscam-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-antiscam-backend
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "8000:8000"
    
    # 环境变量（使用.env文件）
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://172.30.64.1:11434
      - OLLAMA_BASE_URL_SCAMMER=http://172.30.64.1:11434
      - OLLAMA_BASE_URL_VICTIM=http://172.30.64.1:11434
      - OLLAMA_BASE_URL_EXPERT=http://172.30.64.1:11434
      - OLLAMA_BASE_URL_RECORDER=http://172.30.64.1:11434
    
    # 卷挂载（代码热重载）
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    
    # 网络
    networks:
      - ai-antiscam-network

networks:
  ai-antiscam-network:
    driver: bridge

