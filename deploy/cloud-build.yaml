steps:
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-agent-backend', './backend']
    dir: '.'

  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-agent-frontend', './frontend']
    dir: '.'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-agent-backend']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-agent-frontend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-agent-backend'
      - '--image=gcr.io/$PROJECT_ID/ai-agent-backend'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_API_KEY=${_GOOGLE_API_KEY}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-agent-frontend'
      - '--image=gcr.io/$PROJECT_ID/ai-agent-frontend'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'

substitutions:
  _GOOGLE_API_KEY: 'your-google-api-key-here'

options:
  logging: CLOUD_LOGGING_ONLY

