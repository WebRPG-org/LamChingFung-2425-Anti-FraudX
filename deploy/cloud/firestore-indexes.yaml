# Firestore 索引配置
# 用於優化 Anti-FraudX 的數據庫查詢

indexes:
  # 遊戲會話索引
  - collectionGroup: game_sessions
    queryScope: Collection
    fields:
      - fieldPath: created_at
        order: DESCENDING
      - fieldPath: user_id
        order: ASCENDING
  
  - collectionGroup: game_sessions
    queryScope: Collection
    fields:
      - fieldPath: status
        order: ASCENDING
      - fieldPath: updated_at
        order: DESCENDING
  
  # 對話索引
  - collectionGroup: conversations
    queryScope: Collection
    fields:
      - fieldPath: session_id
        order: ASCENDING
      - fieldPath: created_at
        order: DESCENDING
  
  - collectionGroup: conversations
    queryScope: Collection
    fields:
      - fieldPath: role
        order: ASCENDING
      - fieldPath: created_at
        order: DESCENDING
  
  # 評分索引
  - collectionGroup: scores
    queryScope: Collection
    fields:
      - fieldPath: score
        order: DESCENDING
      - fieldPath: created_at
        order: DESCENDING
  
  - collectionGroup: scores
    queryScope: Collection
    fields:
      - fieldPath: user_id
        order: ASCENDING
      - fieldPath: created_at
        order: DESCENDING
  
  # 用戶索引
  - collectionGroup: users
    queryScope: Collection
    fields:
      - fieldPath: created_at
        order: DESCENDING
      - fieldPath: status
        order: ASCENDING
  
  - collectionGroup: users
    queryScope: Collection
    fields:
      - fieldPath: email
        order: ASCENDING

# TTL 策略（自動刪除過期數據）
ttlConfig:
  - collectionId: game_sessions
    ttlDays: 90
  
  - collectionId: conversations
    ttlDays: 90
  
  - collectionId: scores
    ttlDays: 365

