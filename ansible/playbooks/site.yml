---
# ============================================================
# site.yml — Full deployment (all components)
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/site.yml
# ============================================================

- name: AI Anti-Fraud Platform — Full Deployment
  hosts: all
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Show deployment info
      debug:
        msg: |
          Host:        {{ inventory_hostname }} ({{ ansible_host }})
          Deploy mode: {{ deploy_mode | default('local') }}
          LLM:         {{ 'Gemini' if gemini_enabled else 'Ollama (' + ollama_model + ')' }}
          GPU:         {{ nvidia_gpu | default(false) }}
          Domain:      {{ app_domain | default('localhost') }}:{{ backend_port }}

  roles:
    - role: common
      tags: [common, base]

    - role: ollama
      tags: [ollama, llm]
      when: not gemini_enabled

    - role: backend
      tags: [backend, api]

    - role: nginx
      tags: [nginx, webserver]
      when: nginx_install | default(true)

  post_tasks:
    - name: Deployment complete
      debug:
        msg: |
          Deployment complete!
          API:     http://{{ ansible_host }}:{{ backend_port }}
          RPGv2:   http://{{ ansible_host }}:{{ backend_port }}/rpgv2
          Docs:    http://{{ ansible_host }}:{{ backend_port }}/docs
          Health:  http://{{ ansible_host }}:{{ backend_port }}/health
          Logs:    {{ log_dir }}/
