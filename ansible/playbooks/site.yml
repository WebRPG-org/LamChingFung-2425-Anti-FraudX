---
# Main playbook - Complete installation

- name: Deploy Hong Kong Anti-Scam RPG - Complete Installation
  hosts: game_servers
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Display deployment information
      debug:
        msg: |
          Deploying {{ app_name }} to {{ inventory_hostname }}
          Frontend: {{ frontend_domain }}:{{ frontend_port }}
          Backend: {{ backend_domain }}:{{ backend_port }}

  roles:
    - role: common
      tags: ['common', 'base']
    
    - role: frontend
      tags: ['frontend', 'game']
    
    - role: backend
      tags: ['backend', 'api']
    
    - role: nginx
      tags: ['nginx', 'webserver']
      when: enable_ssl or frontend_port == 80

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          ✅ Deployment completed successfully!
          
          Frontend URL: http://{{ frontend_domain }}:{{ frontend_port }}
          Backend API: http://{{ backend_domain }}:{{ backend_port }}
          
          Next steps:
          1. Configure your domain DNS
          2. Set up SSL certificates (if needed)
          3. Test the application
          4. Monitor logs in {{ log_dir }}

    - name: Send deployment notification (optional)
      debug:
        msg: "Deployment notification would be sent here"
      when: false  # Enable when notification system is configured
