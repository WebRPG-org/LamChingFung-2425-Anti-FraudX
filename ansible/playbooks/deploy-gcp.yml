---
# ============================================================
# deploy-gcp.yml — GCP deployment (Gemini default / GCE GPU)
# Usage:
#   Gemini mode: ansible-playbook -i inventory/hosts.yml playbooks/deploy-gcp.yml
#   GPU mode:    ansible-playbook -i inventory/hosts.yml playbooks/deploy-gcp.yml -e "gemini_enabled=false nvidia_gpu=true"
# ============================================================

- name: AI Anti-Fraud Platform — GCP Deployment
  hosts: gcp_servers
  become: yes
  gather_facts: yes

  vars:
    deploy_mode: gcp
    # GCP defaults: use Gemini (no Ollama needed on Cloud)
    gemini_enabled: true
    nginx_install: true
    enable_ssl: true   # Use Let's Encrypt or GCP managed cert

  pre_tasks:
    - name: Show GCP deployment info
      debug:
        msg: |
          GCP Deployment
          Host:   {{ inventory_hostname }}
          LLM:    {{ 'Gemini API' if gemini_enabled else 'Ollama on GCE GPU' }}
          Domain: {{ app_domain }}
          SSL:    {{ enable_ssl }}

    - name: Install GCP ops agent (Cloud Logging)
      shell: |
        curl -sSO https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
        bash add-google-cloud-ops-agent-repo.sh --also-install
      args:
        creates: /etc/google-cloud-ops-agent/config.yaml
      ignore_errors: yes

  roles:
    - role: common
      tags: [common]

    - role: ollama
      tags: [ollama]
      when: not gemini_enabled

    - role: backend
      tags: [backend]

    - role: nginx
      tags: [nginx]
      when: nginx_install

  post_tasks:
    - name: Configure GCP firewall note
      debug:
        msg: |
          Remember to open GCP firewall rules:
            gcloud compute firewall-rules create allow-antiscam \
              --allow tcp:80,tcp:443,tcp:{{ backend_port }} \
              --target-tags antiscam-server

    - name: GCP deployment complete
      debug:
        msg: |
          GCP deployment complete!
          API:   https://{{ app_domain }}/
          RPGv2: https://{{ app_domain }}/rpgv2
          Docs:  https://{{ app_domain }}/docs
