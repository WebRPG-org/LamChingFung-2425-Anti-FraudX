---
# Development environment setup playbook

- name: Setup Development Environment
  hosts: dev_machines
  become: yes
  gather_facts: yes

  tasks:
    - name: Install development tools
      package:
        name:
          - git
          - curl
          - wget
          - vim
          - htop
        state: present

    - name: Install Node.js {{ nodejs_version }}
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }} | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node
      when: ansible_os_family == "Debian"

    - name: Install Python {{ python_version }}
      package:
        name:
          - python{{ python_version }}
          - python{{ python_version }}-pip
          - python{{ python_version }}-venv
        state: present
      when: ansible_os_family == "Debian"

    - name: Clone repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ install_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"
      when: git_repo is defined

    - name: Install frontend dependencies
      npm:
        path: "{{ install_dir }}/rpg-platform-v2"
        state: present
      become_user: "{{ ansible_user }}"

    - name: Install backend dependencies
      pip:
        requirements: "{{ install_dir }}/backend/requirements.txt"
        virtualenv: "{{ install_dir }}/backend/venv"
        virtualenv_command: python{{ python_version }} -m venv
      become_user: "{{ ansible_user }}"

    - name: Create .env file for backend
      template:
        src: ../templates/backend.env.j2
        dest: "{{ install_dir }}/backend/.env"
        owner: "{{ ansible_user }}"
        mode: '0600'

    - name: Display development setup info
      debug:
        msg: |
          Development environment ready!
          
          Project location: {{ install_dir }}
          
          To start development:
          1. cd {{ install_dir }}/rpg-platform-v2 && npm run dev
          2. cd {{ install_dir }}/backend && source venv/bin/activate && python app.py
