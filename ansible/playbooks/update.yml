---
# Update existing installation playbook

- name: Update Hong Kong Anti-Scam RPG
  hosts: game_servers
  become: yes
  gather_facts: yes

  tasks:
    - name: Stop services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ app_name }}-frontend"
        - "{{ app_name }}-backend"
      ignore_errors: yes

    - name: Pull latest code
      git:
        repo: "{{ git_repo }}"
        dest: "{{ install_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ app_user }}"

    - name: Update frontend dependencies
      npm:
        path: "{{ frontend_build_dir }}"
        state: latest
      become_user: "{{ app_user }}"

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ frontend_build_dir }}"
      become_user: "{{ app_user }}"

    - name: Update backend dependencies
      pip:
        requirements: "{{ backend_dir }}/requirements.txt"
        virtualenv: "{{ backend_dir }}/venv"
        state: latest
      become_user: "{{ app_user }}"

    - name: Restart services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - "{{ app_name }}-frontend"
        - "{{ app_name }}-backend"

    - name: Wait for services to be ready
      wait_for:
        port: "{{ item }}"
        delay: 5
        timeout: 30
      loop:
        - "{{ frontend_port }}"
        - "{{ backend_port }}"

    - name: Display update completion message
      debug:
        msg: "✅ Update completed successfully!"
