---
# Backend API deployment playbook

- name: Deploy AI Backend API
  hosts: backend_servers:game_servers
  become: yes
  gather_facts: yes

  roles:
    - role: common
      tags: ['common']
    
    - role: backend
      tags: ['backend']

  post_tasks:
    - name: Verify backend API is running
      uri:
        url: "http://localhost:{{ backend_port }}/health"
        status_code: 200
      register: backend_check
      retries: 3
      delay: 5
      until: backend_check.status == 200
      ignore_errors: yes

    - name: Display backend URL
      debug:
        msg: "Backend API is running at http://{{ ansible_host }}:{{ backend_port }}"
