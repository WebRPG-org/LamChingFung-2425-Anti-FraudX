---
# ============================================================
# AI Anti-Fraud Platform — Global Ansible Variables
# Version: 4.1 | Updated: 2026-03-11
# ============================================================

# ── Application ─────────────────────────────────────────────
app_name: ai-antiscam
app_user: antiscam
app_group: antiscam
install_dir: /opt/{{ app_name }}
log_dir: /var/log/{{ app_name }}
backup_dir: /backup/{{ app_name }}

# ── Git ─────────────────────────────────────────────────────
git_repo: https://github.com/yourusername/AI-Agentv4.git
git_branch: main

# ── Python ──────────────────────────────────────────────────
python_version: "3.10"

# ── Backend (FastAPI + uvicorn) ──────────────────────────────
backend_port: 8000
backend_dir: "{{ install_dir }}/backend"
backend_workers: 1          # Keep at 1 — session state is in-memory

# ── Frontend (rpg-platform-v2, served by FastAPI) ────────────
# FastAPI serves the built frontend — no separate Node server needed
frontend_build_dir: "{{ install_dir }}/rpg-platform-v2"
nodejs_version: "20.x"      # Needed only for building rpg-platform-v2

# ── LLM Provider ────────────────────────────────────────────
# Set gemini_enabled=true to skip Ollama installation
gemini_enabled: false
gemini_api_key: "{{ vault_gemini_api_key | default('') }}"
gemini_model_scammer: "gemini-2.5-flash"
gemini_model_expert: "gemini-2.5-flash"
gemini_model_victim: "gemini-2.5-flash"
gemini_model_recorder: "gemini-2.5-flash"
gemini_max_output_tokens: 800
gemini_timeout: 45.0

# ── Ollama ───────────────────────────────────────────────────
ollama_install: "{{ not gemini_enabled }}"
ollama_port: 11434
ollama_base_url: "http://localhost:{{ ollama_port }}"
ollama_model: "gemma3:4b"
ollama_models_to_pull:
  - gemma3:4b
# After Tools Center fine-tune, add custom models:
# - anti-fraud-expert
# - scammer-sim
ollama_num_ctx: 2048
ollama_num_predict: 400
ollama_temperature: 0.7
ollama_keep_alive: "5m"
ollama_num_parallel: 2
ollama_max_loaded_models: 2

# ── GPU ──────────────────────────────────────────────────────
nvidia_gpu: false           # Set true on GPU instances (installs NVIDIA Container Toolkit)
force_gpu: 0                # 1 = exit if no GPU found

# ── Per-agent model overrides (optional) ─────────────────────
agent_model_scammer: "{{ ollama_model }}"
agent_model_expert: "{{ ollama_model }}"
agent_model_victim: "{{ ollama_model }}"
agent_model_recorder: "{{ ollama_model }}"

# ── Nginx ────────────────────────────────────────────────────
nginx_install: true
app_domain: "antiscam.example.com"
enable_ssl: false
ssl_cert_path: "/etc/ssl/certs/{{ app_domain }}.crt"
ssl_key_path: "/etc/ssl/private/{{ app_domain }}.key"
nginx_client_max_body_size: "10M"

# ── Firewall ─────────────────────────────────────────────────
enable_firewall: true
allowed_ports:
  - 22     # SSH
  - 80     # HTTP
  - 443    # HTTPS
  - "{{ backend_port }}"

# ── System ───────────────────────────────────────────────────
timezone: Asia/Hong_Kong
locale: zh_HK.UTF-8

# ── Backup ───────────────────────────────────────────────────
enable_backup: true
backup_retention_days: 7

# ── Deployment mode ──────────────────────────────────────────
# local: bare-metal / VM
# docker: Docker Compose
# gcp:   GCP Cloud Run or GCE
# aws:   AWS ECS or EC2
deploy_mode: local
