---
# ============================================================
# Inventory Example — copy to hosts.yml and edit
# ============================================================

all:
  children:

    # ── Local / bare-metal servers ───────────────────────────
    local_servers:
      hosts:
        server1:
          ansible_host: 192.168.1.10
          ansible_user: ubuntu
          nvidia_gpu: true       # Has NVIDIA GPU for Ollama
        server2:
          ansible_host: 192.168.1.11
          ansible_user: ubuntu
          gemini_enabled: true   # Use Gemini instead of Ollama
          gemini_api_key: "your-api-key-here"

    # ── GCP instances ────────────────────────────────────────
    gcp_servers:
      vars:
        ansible_user: ubuntu
        deploy_mode: gcp
        gemini_enabled: true     # GCP default: use Gemini
      hosts:
        gcp-instance-1:
          ansible_host: 34.xxx.xxx.xxx
          app_domain: antiscam.your-domain.com
          enable_ssl: true
        gcp-gpu-1:
          ansible_host: 35.xxx.xxx.xxx
          gemini_enabled: false  # This GCE instance has GPU + Ollama
          nvidia_gpu: true

    # ── AWS instances ─────────────────────────────────────────
    aws_servers:
      vars:
        ansible_user: ubuntu
        deploy_mode: aws
        gemini_enabled: true     # AWS default: use Gemini
      hosts:
        aws-ec2-1:
          ansible_host: ec2-xxx.compute.amazonaws.com
          ansible_ssh_private_key_file: ~/.ssh/aws-key.pem
          app_domain: antiscam.your-domain.com
          enable_ssl: true
        aws-gpu-1:
          ansible_host: ec2-yyy.compute.amazonaws.com
          ansible_ssh_private_key_file: ~/.ssh/aws-key.pem
          gemini_enabled: false  # g4dn instance with GPU + Ollama
          nvidia_gpu: true
