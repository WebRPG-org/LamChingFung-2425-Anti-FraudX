---
# Inventory for Hong Kong Anti-Scam RPG Deployment

all:
  children:
    # Game servers (frontend + backend)
    game_servers:
      hosts:
        # Example servers - replace with your actual IPs/hostnames
        game-server-1:
          ansible_host: 192.168.1.10
          ansible_user: ansible
          ansible_port: 22
        
        game-server-2:
          ansible_host: 192.168.1.11
          ansible_user: ansible
          ansible_port: 22
    
    # Frontend only servers
    frontend_servers:
      hosts:
        frontend-1:
          ansible_host: 192.168.1.20
          ansible_user: ansible
    
    # Backend only servers (AI API)
    backend_servers:
      hosts:
        backend-1:
          ansible_host: 192.168.1.30
          ansible_user: ansible
    
    # Development machines
    dev_machines:
      hosts:
        dev-1:
          ansible_host: 192.168.1.100
          ansible_user: developer
          ansible_connection: local  # For local machine
    
    # Windows machines (requires WinRM)
    windows_machines:
      hosts:
        win-1:
          ansible_host: 192.168.1.50
          ansible_user: Administrator
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
      vars:
        ansible_port: 5986

  vars:
    # Global variables for all hosts
    ansible_python_interpreter: /usr/bin/python3
