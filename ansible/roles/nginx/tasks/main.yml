---
# ============================================================
# nginx role — Reverse proxy for FastAPI backend
# ============================================================

- name: Install nginx
  apt:
    name: nginx
    state: present
  when: ansible_os_family == "Debian"

- name: Write nginx site config
  template:
    src: antiscam-nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ app_name }}
    mode: '0644'
  notify: reload nginx

- name: Enable nginx site
  file:
    src: /etc/nginx/sites-available/{{ app_name }}
    dest: /etc/nginx/sites-enabled/{{ app_name }}
    state: link
  notify: reload nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Test nginx config
  command: nginx -t
  changed_when: false

- name: Enable and start nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

- name: Install certbot (Let's Encrypt)
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: enable_ssl and ansible_os_family == "Debian"

- name: Obtain SSL certificate
  command: >
    certbot --nginx -d {{ app_domain }}
    --non-interactive --agree-tos
    --email admin@{{ app_domain }}
    --redirect
  args:
    creates: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem
  when: enable_ssl
  ignore_errors: yes
