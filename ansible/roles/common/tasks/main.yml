---
# ============================================================
# common role — Base system setup
# Supports: Ubuntu 22.04 / Debian
# ============================================================

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - unzip
      - build-essential
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Create application group
  group:
    name: "{{ app_group }}"
    state: present

- name: Create application user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  loop:
    - "{{ install_dir }}"
    - "{{ log_dir }}"
    - "{{ backup_dir }}"
    - "{{ backend_dir }}/training_data"
    - "{{ backend_dir }}/training_data/fine_tuning_data"
    - "{{ backend_dir }}/models"
    - "{{ backend_dir }}/db"
    - "{{ backend_dir }}/logs"

# ── Python 3.10 ─────────────────────────────────────────────
- name: Install Python {{ python_version }}
  apt:
    name:
      - python{{ python_version }}
      - python{{ python_version }}-pip
      - python{{ python_version }}-venv
      - python{{ python_version }}-dev
    state: present
  when: ansible_os_family == "Debian"

- name: Set python3 default to {{ python_version }}
  alternatives:
    name: python3
    link: /usr/bin/python3
    path: /usr/bin/python{{ python_version }}
  when: ansible_os_family == "Debian"
  ignore_errors: yes

- name: Install global pip tools
  pip:
    name:
      - virtualenv
      - setuptools
      - wheel
    state: present
    executable: pip{{ python_version }}

# ── Node.js (for rpg-platform-v2 build only) ─────────────────
- name: Add NodeSource repo
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }} | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  when: ansible_os_family == "Debian"

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

# ── NVIDIA (optional, GPU hosts only) ────────────────────────
- name: Install NVIDIA Container Toolkit
  block:
    - name: Add NVIDIA Container Toolkit repo
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install nvidia-container-toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes
  when: nvidia_gpu | default(false)

# ── Firewall ─────────────────────────────────────────────────
- name: Allow ports in UFW
  ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ allowed_ports }}"
  when: enable_firewall and ansible_os_family == "Debian"

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
  when: enable_firewall and ansible_os_family == "Debian"

- name: Common setup complete
  debug:
    msg: |
      Base setup done:
        Python {{ python_version }}, Node.js {{ nodejs_version }}
        App user: {{ app_user }}, Install dir: {{ install_dir }}
        GPU support: {{ nvidia_gpu | default(false) }}
