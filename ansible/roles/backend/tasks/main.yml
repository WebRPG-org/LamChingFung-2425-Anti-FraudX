---
# ============================================================
# backend role — FastAPI + uvicorn deployment
# ============================================================

- name: Clone / update repository
  git:
    repo: "{{ git_repo }}"
    dest: "{{ install_dir }}"
    version: "{{ git_branch }}"
    force: yes
    update: yes
  become_user: "{{ app_user }}"

- name: Create Python virtualenv
  pip:
    name: pip
    virtualenv: "{{ backend_dir }}/venv"
    virtualenv_command: python{{ python_version }} -m venv
    state: latest
  become_user: "{{ app_user }}"

- name: Install backend requirements
  pip:
    requirements: "{{ backend_dir }}/requirements.txt"
    virtualenv: "{{ backend_dir }}/venv"
    extra_args: "--no-cache-dir"
  become_user: "{{ app_user }}"

- name: Build rpg-platform-v2 frontend
  block:
    - name: Install npm dependencies
      npm:
        path: "{{ frontend_build_dir }}"
        state: present
        ci: yes
      become_user: "{{ app_user }}"

    - name: Build Vite/TypeScript frontend
      command: npm run build
      args:
        chdir: "{{ frontend_build_dir }}"
      become_user: "{{ app_user }}"
      register: build_result
      changed_when: build_result.rc == 0
  rescue:
    - name: Frontend build failed (non-fatal)
      debug:
        msg: "Frontend build failed — serving from pre-built dist if available."

- name: Write backend .env
  template:
    src: backend.env.j2
    dest: "{{ backend_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0600'

- name: Create systemd service
  template:
    src: backend.service.j2
    dest: /etc/systemd/system/{{ app_name }}-backend.service
    mode: '0644'
  notify:
    - reload systemd
    - restart backend

- name: Enable and start backend service
  systemd:
    name: "{{ app_name }}-backend"
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for backend to be ready
  wait_for:
    port: "{{ backend_port }}"
    delay: 5
    timeout: 90

- name: Health check
  uri:
    url: "http://localhost:{{ backend_port }}/health"
    status_code: 200
  retries: 5
  delay: 5
  register: health
  until: health.status == 200
  ignore_errors: yes

- name: Backend deployment complete
  debug:
    msg: |
      Backend ready:
        API:    http://{{ ansible_host }}:{{ backend_port }}
        RPGv2:  http://{{ ansible_host }}:{{ backend_port }}/rpgv2
        Docs:   http://{{ ansible_host }}:{{ backend_port }}/docs
        Health: {{ health.status | default('N/A') }}
