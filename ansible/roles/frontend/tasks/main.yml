---
# Frontend role - RPG game deployment

- name: Clone or update repository
  git:
    repo: "{{ git_repo }}"
    dest: "{{ install_dir }}"
    version: "{{ git_branch }}"
    force: yes
  become_user: "{{ app_user }}"
  when: git_repo is defined

- name: Copy project files (if not using git)
  synchronize:
    src: "{{ playbook_dir }}/../../rpg-platform-v2/"
    dest: "{{ frontend_build_dir }}/"
    delete: yes
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=.git"
  become_user: "{{ app_user }}"
  when: git_repo is not defined

- name: Install frontend dependencies
  npm:
    path: "{{ frontend_build_dir }}"
    state: present
  become_user: "{{ app_user }}"

- name: Create frontend .env file
  template:
    src: frontend.env.j2
    dest: "{{ frontend_build_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'

- name: Build frontend for production
  command: npm run build
  args:
    chdir: "{{ frontend_build_dir }}"
  become_user: "{{ app_user }}"
  when: not dev_mode

- name: Create PM2 ecosystem file
  template:
    src: frontend-pm2.config.js.j2
    dest: "{{ frontend_build_dir }}/ecosystem.config.js"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'

- name: Stop existing PM2 processes
  command: pm2 delete {{ app_name }}-frontend
  become_user: "{{ app_user }}"
  ignore_errors: yes

- name: Start frontend with PM2
  command: pm2 start ecosystem.config.js
  args:
    chdir: "{{ frontend_build_dir }}"
  become_user: "{{ app_user }}"

- name: Save PM2 configuration
  command: pm2 save
  become_user: "{{ app_user }}"

- name: Setup PM2 startup script
  command: pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}
  register: pm2_startup
  changed_when: false

- name: Execute PM2 startup command
  shell: "{{ pm2_startup.stdout }}"
  when: pm2_startup.stdout is defined

- name: Create systemd service for frontend
  template:
    src: frontend.service.j2
    dest: /etc/systemd/system/{{ app_name }}-frontend.service
    mode: '0644'
  notify: reload systemd

- name: Enable and start frontend service
  systemd:
    name: "{{ app_name }}-frontend"
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for frontend to be ready
  wait_for:
    port: "{{ frontend_port }}"
    delay: 5
    timeout: 60

- name: Display frontend information
  debug:
    msg: |
      Frontend deployed successfully!
      URL: http://{{ ansible_host }}:{{ frontend_port }}
      Build dir: {{ frontend_build_dir }}
      Logs: {{ log_dir }}/frontend.log
