# ============================================================
# docker-compose.aws.yml — AWS deployment
#
# Targets:
#   - App Runner / ECS Fargate (Gemini mode, serverless)
#   - EC2 with GPU (Ollama mode, g4dn / g5 instance)
#
# Gemini mode (App Runner / ECS):
#   docker compose -f docker-compose.aws.yml up
#
# Ollama mode (EC2 GPU):
#   docker compose -f docker-compose.aws.yml --profile ollama up
#
# Required env vars:
#   GEMINI_API_KEY, AWS_ACCOUNT_ID, AWS_REGION, ECR_REPO
# ============================================================

services:

  # ── Ollama (EC2 GPU only) ────────────────────────────────
  # Only started when: --profile ollama
  ollama:
    profiles: [ollama]
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: ai-antiscam-ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=10m
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_models_aws:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - antiscam-aws
    shm_size: '2gb'
    logging:
      driver: awslogs
      options:
        awslogs-group: /ai-antiscam/ollama
        awslogs-region: ${AWS_REGION:-ap-east-1}
        awslogs-stream-prefix: ollama

  # ── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Tag for ECR:
      # ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-ap-east-1}.amazonaws.com/${ECR_REPO:-ai-antiscam}:${IMAGE_TAG:-latest}
    container_name: ai-antiscam-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"   # ECS / App Runner uses 8080
    environment:
      # ── LLM provider ──────────────────────────────────
      # Default: Gemini (no Ollama needed on ECS Fargate / App Runner)
      - GEMINI_ENABLED=${GEMINI_ENABLED:-true}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_SCAMMER=${GEMINI_MODEL_SCAMMER:-gemini-2.5-flash}
      - GEMINI_MODEL_EXPERT=${GEMINI_MODEL_EXPERT:-gemini-2.5-flash}
      - GEMINI_MODEL_VICTIM=${GEMINI_MODEL_VICTIM:-gemini-2.5-flash}
      - GEMINI_MODEL_RECORDER=${GEMINI_MODEL_RECORDER:-gemini-2.5-flash}
      - GEMINI_MAX_OUTPUT_TOKENS=800
      - GEMINI_TIMEOUT=45.0
      - GEMINI_MAX_RETRIES=2
      # Ollama fallback (EC2 mode with --profile ollama)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=400
      # ── App ───────────────────────────────────────────
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FORCE_GPU=0
      - PORT=8080
      # ── AWS specifics ─────────────────────────────────
      # Secrets Manager ARNs (resolved by ECS task role)
      - AWS_REGION=${AWS_REGION:-ap-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - antiscam-aws
    logging:
      driver: awslogs
      options:
        awslogs-group: /ai-antiscam/backend
        awslogs-region: ${AWS_REGION:-ap-east-1}
        awslogs-stream-prefix: backend

networks:
  antiscam-aws:
    driver: bridge

volumes:
  ollama_models_aws:
    name: ai-antiscam-ollama-models-aws
