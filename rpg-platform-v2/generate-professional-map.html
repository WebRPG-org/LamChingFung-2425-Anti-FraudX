<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業級 RPG 地圖生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 3em;
            margin: 30px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.9;
            color: #64b5f6;
        }
        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .control-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
        }
        .control-item select,
        .control-item input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        button.primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 20px;
            padding: 18px 50px;
        }
        button.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .preview-section {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .preview-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .canvas-container {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            max-height: 800px;
            border: 3px solid rgba(255,215,0,0.3);
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .info-card strong {
            color: #64b5f6;
            display: block;
            margin-bottom: 5px;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            display: none;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.3em;
        }
        .spinner {
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #ffd700;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .feature-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(100,181,246,0.3);
            transition: all 0.3s ease;
        }
        .feature-item:hover {
            transform: translateY(-5px);
            border-color: rgba(100,181,246,0.6);
            box-shadow: 0 10px 30px rgba(100,181,246,0.2);
        }
        .feature-item h3 {
            color: #64b5f6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ 專業級 RPG 地圖生成器</h1>
        <p class="subtitle">大型精緻地圖 • 專業級細節 • 完整城市系統</p>
        
        <div class="controls">
            <h2 style="color: #ffd700; margin-bottom: 20px;">⚙️ 地圖配置</h2>
            <div class="control-grid">
                <div class="control-item">
                    <label>地圖尺寸</label>
                    <select id="mapSize">
                        <option value="1600x1200">大型 (1600x1200)</option>
                        <option value="2400x1800">超大型 (2400x1800)</option>
                        <option value="3200x2400">巨型 (3200x2400)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>細節等級</label>
                    <select id="detailLevel">
                        <option value="high">高 (推薦)</option>
                        <option value="ultra">超高 (最精緻)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>建築數量</label>
                    <select id="buildingCount">
                        <option value="10">10 棟</option>
                        <option value="15">15 棟</option>
                        <option value="20">20 棟 (推薦)</option>
                        <option value="30">30 棟</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>裝飾密度</label>
                    <select id="decorationDensity">
                        <option value="medium">中等</option>
                        <option value="high">高 (推薦)</option>
                        <option value="ultra">超高</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button class="primary" onclick="generateProfessionalMap()">🎨 生成專業地圖</button>
                <button class="success" onclick="downloadMap()">💾 下載地圖</button>
                <button onclick="generateTileset()">🧩 生成瓦片集</button>
            </div>
        </div>

        <div class="success-msg" id="successMsg">
            <h2>✅ 專業地圖生成成功！</h2>
            <p id="mapInfo"></p>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>正在生成專業級地圖，請稍候...</p>
        </div>

        <div class="preview-section" id="previewSection" style="display:none;">
            <h2>🗺️ 地圖預覽</h2>
            <div class="canvas-container" id="mapContainer"></div>
            <div class="info-panel" id="infoPanel"></div>
        </div>

        <div class="feature-list">
            <div class="feature-item">
                <h3>🏙️ 完整城市系統</h3>
                <p>多棟建築、道路網絡、公園綠地</p>
            </div>
            <div class="feature-item">
                <h3>🌳 豐富裝飾</h3>
                <p>樹木、花草、路燈、長椅</p>
            </div>
            <div class="feature-item">
                <h3>🎨 精緻細節</h3>
                <p>陰影、高光、紋理、漸變</p>
            </div>
            <div class="feature-item">
                <h3>📐 專業設計</h3>
                <p>RPG Maker 標準、可擴展</p>
            </div>
        </div>
    </div>

    <script src="professional-map-generator.js"></script>
</body>
</html>
