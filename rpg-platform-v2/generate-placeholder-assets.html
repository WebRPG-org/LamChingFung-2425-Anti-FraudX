<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成佔位符素材</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        h1 {
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .preview-item {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        canvas {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            margin: 10px 0;
            image-rendering: pixelated;
            background: #2a2a2a;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .success {
            background: rgba(76, 175, 80, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
        .button-group {
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🎨 RPG 佔位符素材生成器</h1>
    
    <div class="container">
        <h2>📦 生成的素材預覽</h2>
        <div class="preview-grid" id="previewGrid"></div>
        
        <div class="button-group">
            <button onclick="generateAll()">🎨 生成所有素材</button>
            <button onclick="downloadAll()">💾 下載所有素材</button>
        </div>
        
        <div class="success" id="successMsg">
            ✅ 素材已生成！請點擊「下載所有素材」按鈕，然後將檔案放到對應的資料夾中。
        </div>
    </div>

    <script>
        const assets = [];

        function createCanvas(width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            return canvas;
        }

        function drawPlayer(ctx, color, label) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(24, 12, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(20, 20, 8, 12);
            ctx.fillRect(20, 32, 3, 8);
            ctx.fillRect(25, 32, 3, 8);
            ctx.fillRect(16, 22, 4, 8);
            ctx.fillRect(28, 22, 4, 8);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 8px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(label, 24, 45);
        }

        function drawNPC(ctx, color, type) {
            ctx.fillStyle = color;
            if (type === 'scammer') {
                ctx.beginPath();
                ctx.arc(24, 14, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.fillRect(16, 8, 16, 4);
                ctx.fillRect(18, 4, 12, 4);
                ctx.fillStyle = color;
                ctx.fillRect(20, 22, 8, 12);
                ctx.fillRect(20, 34, 3, 8);
                ctx.fillRect(25, 34, 3, 8);
            } else if (type === 'expert') {
                ctx.beginPath();
                ctx.arc(24, 14, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(20, 14, 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(28, 14, 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(23, 14);
                ctx.lineTo(25, 14);
                ctx.stroke();
                ctx.fillStyle = color;
                ctx.fillRect(20, 22, 8, 12);
                ctx.fillRect(20, 34, 3, 8);
                ctx.fillRect(25, 34, 3, 8);
            } else {
                ctx.beginPath();
                ctx.arc(24, 14, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(20, 22, 8, 12);
                ctx.fillRect(20, 34, 3, 8);
                ctx.fillRect(25, 34, 3, 8);
            }
        }

        function generatePlayerSprite() {
            const canvas = createCanvas(48, 48);
            const ctx = canvas.getContext('2d');
            drawPlayer(ctx, '#4CAF50', 'P');
            return { canvas, name: 'player.png', folder: 'sprites' };
        }

        function generateNPCSprites() {
            const npcs = [
                { color: '#F44336', type: 'scammer', name: 'npc-scammer.png' },
                { color: '#2196F3', type: 'expert', name: 'npc-expert.png' },
                { color: '#FFC107', type: 'victim', name: 'npc-victim.png' }
            ];
            
            return npcs.map(npc => {
                const canvas = createCanvas(48, 48);
                const ctx = canvas.getContext('2d');
                drawNPC(ctx, npc.color, npc.type);
                return { canvas, name: npc.name, folder: 'sprites' };
            });
        }

        function generateWorldMap() {
            const canvas = createCanvas(800, 600);
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#7CB342';
            ctx.fillRect(0, 0, 800, 600);
            
            for (let i = 0; i < 100; i++) {
                ctx.fillStyle = `rgba(106, 168, 79, ${Math.random() * 0.3})`;
                ctx.fillRect(
                    Math.random() * 800,
                    Math.random() * 600,
                    Math.random() * 20 + 10,
                    Math.random() * 20 + 10
                );
            }
            
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(0, 280, 800, 40);
            ctx.fillRect(380, 0, 40, 600);
            
            ctx.fillStyle = '#BDBDBD';
            ctx.fillRect(100, 100, 150, 120);
            ctx.fillStyle = '#D32F2F';
            ctx.fillRect(100, 80, 150, 20);
            
            ctx.fillStyle = '#BDBDBD';
            ctx.fillRect(550, 380, 150, 120);
            ctx.fillStyle = '#1976D2';
            ctx.fillRect(550, 360, 150, 20);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.strokeText('香港街道', 400, 30);
            ctx.fillText('香港街道', 400, 30);
            
            return { canvas, name: 'world-map.png', folder: 'maps' };
        }

        function generateDialogueBox() {
            const canvas = createCanvas(600, 150);
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, 600, 150);
            
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, 580, 130);
            
            ctx.fillStyle = '#FFD700';
            [[10, 10], [590, 10], [10, 140], [590, 140]].forEach(([x, y]) => {
                ctx.fillRect(x - 2, y - 2, 8, 8);
            });
            
            return { canvas, name: 'dialogue-box.png', folder: 'ui' };
        }

        function generateButton() {
            const canvas = createCanvas(200, 60);
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 60);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 200, 60);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, 200, 60);
            
            return { canvas, name: 'button.png', folder: 'ui' };
        }

        function generateAll() {
            assets.length = 0;
            const previewGrid = document.getElementById('previewGrid');
            previewGrid.innerHTML = '';
            
            assets.push(generatePlayerSprite());
            assets.push(...generateNPCSprites());
            assets.push(generateWorldMap());
            assets.push(generateDialogueBox());
            assets.push(generateButton());
            
            assets.forEach(asset => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                
                const title = document.createElement('h3');
                title.textContent = asset.name;
                item.appendChild(title);
                
                const preview = asset.canvas.cloneNode(true);
                preview.style.maxWidth = '100%';
                preview.style.height = 'auto';
                item.appendChild(preview);
                
                const info = document.createElement('p');
                info.textContent = `${asset.canvas.width}x${asset.canvas.height}`;
                info.style.fontSize = '12px';
                info.style.opacity = '0.7';
                item.appendChild(info);
                
                previewGrid.appendChild(item);
            });
            
            document.getElementById('successMsg').style.display = 'block';
        }

        function downloadAll() {
            if (assets.length === 0) {
                alert('請先點擊「生成所有素材」按鈕！');
                return;
            }
            
            assets.forEach(asset => {
                asset.canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = asset.name;
                    a.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');
            });
            
            setTimeout(() => {
                alert(`✅ 已開始下載 ${assets.length} 個檔案！\n\n請將檔案放到以下位置：\n\n` +
                      `• player.png, npc-*.png → public/assets/sprites/\n` +
                      `• world-map.png → public/assets/maps/\n` +
                      `• dialogue-box.png, button.png → public/assets/ui/`);
            }, 500);
        }

        window.onload = () => {
            generateAll();
        };
    </script>
</body>
</html>
