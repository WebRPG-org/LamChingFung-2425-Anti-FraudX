<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件測試 - RotatingScamSystem</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #34495e;
            padding: 30px;
            border-radius: 10px;
            position: relative;
        }
        .back-home {
            position: absolute;
            left: 20px;
            top: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-home:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }
        h1 {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 10px;
            padding-left: 0;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #2c3e50;
            border-radius: 5px;
        }
        .status {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        .success {
            background: #27ae60;
        }
        .error {
            background: #e74c3c;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #2980b9;
        }
        #console {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #3498db;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="http://localhost:8000/" class="back-home">🏠 返回主頁</a>
        <h1>🔧 RotatingScamSystem 插件測試</h1>
        
        <div class="test-section">
            <h2>1. API連接測試</h2>
            <div id="api-status">正在檢測...</div>
            <button onclick="testAPI()">重新測試API</button>
            <button onclick="testHealthCheck()">健康檢查</button>
            <button onclick="testJSONEndpoint()">測試 JSON API</button>
        </div>
        
        <div class="test-section">
            <h2>2. 插件配置</h2>
            <div id="plugin-config"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 測試對話生成</h2>
            <button onclick="testVictimResponse()">測試受害者回應</button>
            <button onclick="testScammerResponse()">測試騙徒回應</button>
        </div>
        
        <div class="test-section">
            <h2>4. 快速鏈接</h2>
            <button onclick="window.open('/docs', '_blank')">📚 API 文檔</button>
            <button onclick="window.open('/health', '_blank')">💚 健康檢查</button>
            <button onclick="window.open('/test/json', '_blank')">📊 JSON API</button>
            <button onclick="window.open('/RPG_Project/test_plugin.html', '_blank')">🎮 原始測試頁</button>
        </div>
        
        <div id="console">
            <strong>📝 控制台日誌:</strong>
            <div id="log-output"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let sessionId = null;
        
        function log(message, type = 'info') {
            const output = document.getElementById('log-output');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'error') entry.style.borderLeftColor = '#e74c3c';
            if (type === 'success') entry.style.borderLeftColor = '#27ae60';
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }
        
        async function testAPI() {
            const statusDiv = document.getElementById('api-status');
            statusDiv.innerHTML = '測試中...';
            
            try {
                // 測試後端連接
                const response = await fetch(`${API_URL}/docs`, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '<div class="status success">✅ API連接正常</div>';
                    log('API連接成功: ' + API_URL, 'success');
                    
                    // 測試創建session
                    await testCreateSession();
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ API連接失敗: ${error.message}</div>`;
                log('API連接失敗: ' + error.message, 'error');
            }
        }
        
        async function testHealthCheck() {
            log('正在測試健康檢查端點...', 'info');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log('✅ 健康檢查: ' + JSON.stringify(data), 'success');
            } catch (error) {
                log('❌ 健康檢查失敗: ' + error.message, 'error');
            }
        }
        
        async function testJSONEndpoint() {
            log('正在測試 JSON API 端點...', 'info');
            try {
                const response = await fetch(`${API_URL}/test/json`);
                const data = await response.json();
                log('✅ JSON API 響應:', 'success');
                log(JSON.stringify(data, null, 2), 'info');
            } catch (error) {
                log('❌ JSON API 測試失敗: ' + error.message, 'error');
            }
        }
        
        async function testCreateSession() {
            try {
                const response = await fetch(`${API_URL}/api/game/start`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        persona_type: 'A',
                        scam_type: '電話詐騙'
                    })
                });
                
                const data = await response.json();
                sessionId = data.session_id;
                
                log(`✅ Session創建成功: ${sessionId}`, 'success');
                log(`人設: ${data.persona.name} (${data.persona_type || 'A'})`, 'info');
                log(`騙局: ${data.scam_type}`, 'info');
                
                return sessionId;
            } catch (error) {
                log('Session創建失敗: ' + error.message, 'error');
            }
        }
        
        async function testVictimResponse() {
            if (!sessionId) {
                await testCreateSession();
            }
            
            log('正在測試受害者回應生成...', 'info');
            
            try {
                const response = await fetch(`${API_URL}/api/game/message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: '騙徒剛剛說：「你的銀行戶口有問題，需要立即處理！」\n\n請以你的角色身份自然回應。',
                        target_ai: 'AI-A',
                        persona_type: 'A'
                    })
                });
                
                const data = await response.json();
                log('受害者回應: ' + data.reply, 'success');
            } catch (error) {
                log('受害者回應生成失敗: ' + error.message, 'error');
            }
        }
        
        async function testScammerResponse() {
            if (!sessionId) {
                await testCreateSession();
            }
            
            log('正在測試騙徒回應生成...', 'info');
            
            try {
                const response = await fetch(`${API_URL}/api/game/message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: '受害者剛剛說：「真的嗎？我不太清楚...」\n\n你是假公安，正在進行電話詐騙。請繼續詐騙。',
                        target_ai: 'AI-D',
                        persona_type: 'A'
                    })
                });
                
                const data = await response.json();
                log('騙徒回應: ' + data.reply, 'success');
            } catch (error) {
                log('騙徒回應生成失敗: ' + error.message, 'error');
            }
        }
        
        // 顯示插件配置
        function showPluginConfig() {
            const configDiv = document.getElementById('plugin-config');
            const config = {
                'API基礎URL': API_URL,
                '人設系統': 'A (長者), B (一般市民), C (過度自信), D (年輕學生)',
                '騙局數量': '10種',
                'NPC數量': '6個',
                '輪換機制': '對話結束後自動輪換騙局和人設'
            };
            
            let html = '';
            for (const [key, value] of Object.entries(config)) {
                html += `<div><strong>${key}:</strong> ${value}</div>`;
            }
            configDiv.innerHTML = html;
        }
        
        // 頁面加載時執行
        window.onload = function() {
            log('插件測試頁面載入完成', 'info');
            showPluginConfig();
            testAPI();
        };
    </script>
</body>
</html>
