<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-FraudX RPG v2 入口</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=rpgv2-only">
    <script>
        window.__APP_CONFIG__ = window.__APP_CONFIG__ || {};
    </script>
</head>
<body>
    <div class="background-pattern"></div>

    <div class="header">
        <div class="header-content">
            <div class="logo-section">
                <div class="shield-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L4 6V11C4 16.55 7.84 21.74 13 23C18.16 21.74 22 16.55 22 11V6L14 2H12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>Anti-FraudX RPG v2</h1>
                    <p class="subtitle">只保留現行 RPG v2 遊戲入口與 Vertex AI 遊戲主線</p>
                </div>
            </div>
            <div class="header-right">
                <div class="version-badge">RPG v2 Only</div>
            </div>
        </div>
    </div>

    <div class="modes-container">
        <div class="mode-card" data-color="coral" onclick="openMode('rpgv2')">
            <div class="card-glow"></div>
            <div class="mode-content">
                <div class="icon-wrapper">
                    <span class="mode-icon">🎮</span>
                </div>
                <div class="badge-container">
                    <span class="mode-badge updated">保留中</span>
                </div>
                <h2 class="mode-title">RPG v2 遊戲</h2>
                <p class="mode-description">
                    進入現時使用中的 Anti-FraudX RPG v2 雲端前端。
                </p>
                <ul class="mode-features">
                    <li><span class="feature-icon">✓</span>多語言對戰流程</li>
                    <li><span class="feature-icon">✓</span>Vertex AI 驅動 AI 對話</li>
                    <li><span class="feature-icon">✓</span>信任度與勝負判定系統</li>
                </ul>
                <button class="mode-button" onclick="event.stopPropagation(); openMode('rpgv2')" style="background: linear-gradient(135deg, #FA8BFF 0%, #2BD2FF 100%);">
                    <span>開始遊戲</span>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <p class="footer-title">Anti-FraudX</p>
                <p class="footer-tech">已精簡為 RPG v2 專用入口</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
