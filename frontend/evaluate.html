<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對話評估界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --bg-card: #1a1f3a;
            --accent-primary: #00d9ff;
            --accent-secondary: #7b2cbf;
            --accent-success: #06ffa5;
            --accent-warning: #ffb800;
            --accent-danger: #ff006e;
            --text-primary: #e8f1f5;
            --text-secondary: #8892b0;
            --border-color: #2d3561;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            border-color: var(--accent-primary);
            background: var(--bg-card);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
        }

        .conversation-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
        }

        .conversation-panel h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .conversation-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 0.5rem;
        }

        .conversation-list::-webkit-scrollbar {
            width: 6px;
        }

        .conversation-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .conversation-list::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }

        .message {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .message.scammer {
            border-left: 3px solid var(--accent-danger);
        }

        .message.victim {
            border-left: 3px solid var(--accent-success);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .message-role {
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .message.scammer .message-role {
            color: var(--accent-danger);
        }

        .message.victim .message-role {
            color: var(--accent-success);
        }

        .message-strategy {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            color: var(--accent-primary);
        }

        .message-content {
            color: var(--text-primary);
            line-height: 1.6;
        }

        .message-actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1rem;
        }

        .btn-icon:hover {
            color: var(--accent-primary);
        }

        .add-message {
            display: grid;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        select.form-control {
            cursor: pointer;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .settings-panel h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .slider-group {
            margin-bottom: 1.5rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .slider-label span:first-child {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .slider-label span:last-child {
            color: var(--accent-primary);
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 217, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .result-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .result-panel h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .result-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .result-value.positive {
            color: var(--accent-success);
        }

        .result-value.negative {
            color: var(--accent-danger);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-secondary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .settings-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>對話評估界面</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">
                構建對話並評估詐騙效果
            </p>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">📊 監控儀表板</a>
                <a href="evaluate.html" class="nav-link">✨ 評估界面</a>
            </div>
        </div>

        <div class="main-grid">
            <!-- 對話面板 -->
            <div class="conversation-panel">
                <h2>對話構建</h2>
                
                <div class="conversation-list" id="conversationList">
                    <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                        暫無對話，請添加訊息
                    </div>
                </div>

                <div class="add-message">
                    <div class="form-group">
                        <label>角色</label>
                        <select class="form-control" id="messageRole">
                            <option value="scammer">詐騙者 (Scammer)</option>
                            <option value="victim">受害人 (Victim)</option>
                        </select>
                    </div>

                    <div class="form-group" id="strategyGroup">
                        <label>策略</label>
                        <select class="form-control" id="messageStrategy">
                            <option value="authority">權威 (Authority)</option>
                            <option value="urgency">緊急 (Urgency)</option>
                            <option value="sympathy">同情 (Sympathy)</option>
                            <option value="greed">貪婪 (Greed)</option>
                            <option value="fear">恐懼 (Fear)</option>
                            <option value="none">無 (None)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>訊息內容</label>
                        <textarea class="form-control" id="messageContent" 
                                  placeholder="輸入對話內容..."></textarea>
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <button class="btn btn-primary" onclick="addMessage()">
                            ➕ 添加訊息
                        </button>
                        <button class="btn btn-secondary" onclick="clearConversation()">
                            🗑️ 清空對話
                        </button>
                        <button class="btn btn-secondary" onclick="loadExample()">
                            📝 載入示例
                        </button>
                    </div>
                </div>
            </div>

            <!-- 設置面板 -->
            <div class="settings-panel">
                <h2>評估設置</h2>

                <div class="form-group">
                    <label>受害人人設</label>
                    <select class="form-control" id="personaType">
                        <option value="elderly">老年人 (Elderly)</option>
                        <option value="average" selected>普通人 (Average)</option>
                        <option value="overconfident">過度自信 (Overconfident)</option>
                        <option value="student">學生 (Student)</option>
                    </select>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>初始信任度</span>
                        <span id="initialTrustValue">50</span>
                    </div>
                    <input type="range" min="0" max="100" value="50" 
                           id="initialTrust" oninput="updateSlider('initialTrust')">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>規則權重</span>
                        <span id="ruleWeightValue">0.7</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.1" value="0.7" 
                           id="ruleWeight" oninput="updateWeights()">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Agent權重</span>
                        <span id="agentWeightValue">0.3</span>
                    </div>
                    <input type="range" min="0" max="1" step="0.1" value="0.3" 
                           id="agentWeight" oninput="updateWeights()">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="enableAgent" checked>
                    <label for="enableAgent" style="color: var(--text-primary); cursor: pointer;">
                        啟用Agent評分
                    </label>
                </div>

                <button class="btn btn-primary" style="width: 100%;" 
                        onclick="evaluateConversation()" id="evaluateBtn">
                    🚀 開始評估
                </button>

                <div id="resultPanel" style="display: none;">
                    <div class="result-panel">
                        <h3>評估結果</h3>
                        <div class="result-item">
                            <span class="result-label">信任度變化</span>
                            <span class="result-value" id="trustChange">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">信心度</span>
                            <span class="result-value" id="confidence">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">評估方法</span>
                            <span class="result-value" id="method">--</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">評估時間</span>
                            <span class="result-value" id="evalTime">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v2';
        let conversation = [];

        // 初始化
        document.getElementById('messageRole').addEventListener('change', function() {
            document.getElementById('strategyGroup').style.display = 
                this.value === 'scammer' ? 'flex' : 'none';
        });

        // 更新滑塊
        function updateSlider(id) {
            const slider = document.getElementById(id);
            const value = document.getElementById(id + 'Value');
            value.textContent = slider.value;
        }

        // 更新權重
        function updateWeights() {
            const ruleWeight = parseFloat(document.getElementById('ruleWeight').value);
            const agentWeight = 1 - ruleWeight;
            
            document.getElementById('ruleWeightValue').textContent = ruleWeight.toFixed(1);
            document.getElementById('agentWeightValue').textContent = agentWeight.toFixed(1);
            document.getElementById('agentWeight').value = agentWeight;
        }

        // 添加訊息
        function addMessage() {
            const role = document.getElementById('messageRole').value;
            const strategy = document.getElementById('messageStrategy').value;
            const content = document.getElementById('messageContent').value.trim();

            if (!content) {
                alert('請輸入訊息內容');
                return;
            }

            const message = {
                role: role,
                content: content
            };

            if (role === 'scammer') {
                message.strategy = strategy;
            }

            conversation.push(message);
            renderConversation();
            
            // 清空輸入
            document.getElementById('messageContent').value = '';
        }

        // 渲染對話
        function renderConversation() {
            const list = document.getElementById('conversationList');
            
            if (conversation.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                        暫無對話，請添加訊息
                    </div>
                `;
                return;
            }

            list.innerHTML = conversation.map((msg, index) => `
                <div class="message ${msg.role}">
                    <div class="message-header">
                        <span class="message-role">${msg.role === 'scammer' ? '詐騙者' : '受害人'}</span>
                        ${msg.strategy ? `<span class="message-strategy">${msg.strategy}</span>` : ''}
                    </div>
                    <div class="message-content">${msg.content}</div>
                    <div class="message-actions">
                        <button class="btn-icon" onclick="removeMessage(${index})" title="刪除">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 刪除訊息
        function removeMessage(index) {
            conversation.splice(index, 1);
            renderConversation();
        }

        // 清空對話
        function clearConversation() {
            if (conversation.length === 0) return;
            if (!confirm('確定要清空所有對話嗎？')) return;
            
            conversation = [];
            renderConversation();
            document.getElementById('resultPanel').style.display = 'none';
        }

        // 載入示例
        function loadExample() {
            conversation = [
                {
                    role: 'scammer',
                    content: '你好，我是警察局的，你的銀行帳戶涉嫌洗錢！',
                    strategy: 'authority'
                },
                {
                    role: 'victim',
                    content: '什麼？我沒有做違法的事啊！'
                },
                {
                    role: 'scammer',
                    content: '現在必須立即配合調查，否則會凍結你所有資產！',
                    strategy: 'urgency'
                },
                {
                    role: 'victim',
                    content: '那我該怎麼辦？'
                }
            ];
            renderConversation();
        }

        // 評估對話
        async function evaluateConversation() {
            if (conversation.length === 0) {
                alert('請先添加對話訊息');
                return;
            }

            const btn = document.getElementById('evaluateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 評估中...';

            try {
                const response = await fetch(`${API_BASE}/scoring/evaluate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        conversation_history: conversation,
                        persona_type: document.getElementById('personaType').value,
                        initial_trust: parseInt(document.getElementById('initialTrust').value),
                        rule_weight: parseFloat(document.getElementById('ruleWeight').value),
                        agent_weight: parseFloat(document.getElementById('agentWeight').value),
                        enable_agent_scoring: document.getElementById('enableAgent').checked
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResult(data);
                } else {
                    alert('評估失敗: ' + (data.detail || '未知錯誤'));
                }
            } catch (error) {
                console.error('評估失敗:', error);
                alert('無法連接到API服務，請確認服務已啟動');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 開始評估';
            }
        }

        // 顯示結果
        function displayResult(data) {
            document.getElementById('resultPanel').style.display = 'block';
            
            const trustChange = data.trust_change;
            const trustChangeEl = document.getElementById('trustChange');
            trustChangeEl.textContent = `${trustChange > 0 ? '+' : ''}${trustChange.toFixed(2)}`;
            trustChangeEl.className = 'result-value ' + (trustChange > 0 ? 'positive' : 'negative');
            
            document.getElementById('confidence').textContent = `${data.confidence.toFixed(1)}%`;
            document.getElementById('method').textContent = data.method.toUpperCase();
            document.getElementById('evalTime').textContent = `${data.evaluation_time_ms.toFixed(0)}ms`;
        }
    </script>
</body>
</html>
