<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Maker AI 連接測試</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .test-section h3 {
            margin-top: 0;
            color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            border-left-color: #4CAF50;
            color: #2e7d32;
        }
        .error {
            border-left-color: #f44336;
            color: #c62828;
        }
        .info {
            padding: 15px;
            background: #e3f2fd;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status.online {
            background: #4CAF50;
            color: white;
        }
        .status.offline {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 RPG Maker AI 連接測試</h1>
        
        <div class="info">
            <h3>📍 Codespace 信息</h3>
            <p><strong>URL:</strong> <span id="apiUrl">https://crispy-space-goggles-r4rjqj6vpvr5fggq-8000.app.github.dev</span></p>
            <p><strong>狀態:</strong> <span class="status offline" id="status">未測試</span></p>
        </div>

        <div class="test-section">
            <h3>✅ 測試 1: 後端健康檢查</h3>
            <button onclick="testBackendHealth()">運行測試</button>
            <div id="result1" class="result" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>✅ 測試 2: Chat API 健康檢查</h3>
            <button onclick="testChatHealth()">運行測試</button>
            <div id="result2" class="result" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>✅ 測試 3: 遊戲 API 健康檢查</h3>
            <button onclick="testGameHealth()">運行測試</button>
            <div id="result3" class="result" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>✅ 測試 4: 發送測試消息</h3>
            <button onclick="testChatMessage()">運行測試</button>
            <div id="result4" class="result" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>✅ 測試 5: 啟動遊戲會話</h3>
            <button onclick="testGameStart()">運行測試</button>
            <div id="result5" class="result" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>🚀 全部測試</h3>
            <button onclick="runAllTests()">運行所有測試</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://crispy-space-goggles-r4rjqj6vpvr5fggq-8000.app.github.dev';

        function showResult(id, message, success) {
            const element = document.getElementById(id);
            element.style.display = 'block';
            element.className = success ? 'result success' : 'result error';
            element.textContent = message;
        }

        function updateStatus(online) {
            const status = document.getElementById('status');
            status.className = online ? 'status online' : 'status offline';
            status.textContent = online ? '在線' : '離線';
        }

        async function testBackendHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/`);
                const data = await response.json();
                showResult('result1', `✅ 成功！\n${JSON.stringify(data, null, 2)}`, true);
                updateStatus(true);
            } catch (error) {
                showResult('result1', `❌ 錯誤：${error.message}\n\n請確認：\n1. Codespace 後端正在運行\n2. 端口 8000 設置為 Public`, false);
                updateStatus(false);
            }
        }

        async function testChatHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/chat/health`);
                const data = await response.json();
                showResult('result2', `✅ 成功！\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult('result2', `❌ 錯誤：${error.message}`, false);
            }
        }

        async function testGameHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/game/health`);
                const data = await response.json();
                showResult('result3', `✅ 成功！\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult('result3', `❌ 錯誤：${error.message}`, false);
            }
        }

        async function testChatMessage() {
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        role: '友善的測試助手',
                        message: '你好，這是一個測試',
                        history: []
                    })
                });
                const data = await response.json();
                showResult('result4', `✅ 成功！AI 回應：\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult('result4', `❌ 錯誤：${error.message}`, false);
            }
        }

        async function testGameStart() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/game/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        persona_type: 'A'
                    })
                });
                const data = await response.json();
                showResult('result5', `✅ 成功！遊戲已啟動：\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult('result5', `❌ 錯誤：${error.message}`, false);
            }
        }

        async function runAllTests() {
            console.log('🚀 開始運行所有測試...');
            await testBackendHealth();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testChatHealth();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testGameHealth();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testChatMessage();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testGameStart();
            console.log('✅ 所有測試完成！');
        }

        // 頁面加載時自動測試後端健康
        window.onload = () => {
            testBackendHealth();
        };
    </script>
</body>
</html>
